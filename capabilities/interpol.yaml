naftiko: 1.0.0-alpha2
info:
  label: Interpol Notices API
  description: 'Interpol Notices API. 9 operations. Lead operation: Get Red Notices. Self-contained Naftiko capability covering
    one Interpol business surface.'
  tags:
  - Interpol
  - Interpol Notices API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERPOL_API_KEY: INTERPOL_API_KEY
capability:
  consumes:
  - type: http
    namespace: interpol
    baseUri: https://ws-public.interpol.int
    description: Interpol Notices API business capability. Self-contained, no shared references.
    resources:
    - name: notices-v1-red
      path: /notices/v1/red
      operations:
      - name: get
        method: GET
        description: Get Red Notices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: forename
          in: query
          type: string
          description: First name
        - name: name
          in: query
          type: string
          description: Last name
        - name: nationality
          in: query
          type: string
          description: Two digit country code
        - name: ageMax
          in: query
          type: integer
          description: maximum age
        - name: ageMin
          in: query
          type: integer
          description: minimum age
        - name: freeText
          in: query
          type: string
          description: Free text query
        - name: sexId
          in: query
          type: string
          description: Free text query
        - name: arrestWarrantCountryId
          in: query
          type: string
          description: Two digit country code
        - name: page
          in: query
          type: integer
          description: pagination - starts with 1
        - name: resultPerPage
          in: query
          type: integer
          description: resultPerPage
    - name: notices-v1-red-noticeID
      path: /notices/v1/red/{noticeID}
      operations:
      - name: get
        method: GET
        description: Get Red Notice Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noticeID
          in: path
          type: string
          description: Notice ID
          required: true
    - name: notices-v1-red-noticeID-images
      path: /notices/v1/red/{noticeID}/images
      operations:
      - name: get
        method: GET
        description: Get Red Notice Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noticeID
          in: path
          type: string
          description: Notice ID
          required: true
    - name: notices-v1-un
      path: /notices/v1/un
      operations:
      - name: get
        method: GET
        description: Get UN Notices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Last name
        - name: unReference
          in: query
          type: string
          description: UN-Referenz
        - name: unResolution
          in: query
          type: integer
          description: UN-Resolution
        - name: page
          in: query
          type: integer
          description: pagination - starts with 1
        - name: resultPerPage
          in: query
          type: integer
          description: resultPerPage
    - name: notices-v1-un-noticeType-noticeID
      path: /notices/v1/un/{noticeType}/{noticeID}
      operations:
      - name: get
        method: GET
        description: Get UN Notice Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noticeID
          in: path
          type: string
          description: Notice ID
          required: true
        - name: noticeType
          in: path
          type: string
          description: Notice Type (either 'persons' or 'entities')
          required: true
    - name: notices-v1-un-noticeType-noticeID-images
      path: /notices/v1/un/{noticeType}/{noticeID}/images
      operations:
      - name: get
        method: GET
        description: Get UN Notice Images
        outputRawFormat: json
        outputParameters:

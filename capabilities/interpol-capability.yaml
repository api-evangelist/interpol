naftiko: 1.0.0-alpha2
info:
  label: Interpol Notices API
  description: Interpol Red, Yellow and UN Notices API
  tags:
  - Interpol
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: interpol
    baseUri: https://ws-public.interpol.int
    description: Interpol Notices API HTTP API.
    resources:
    - name: notices-v1-red
      path: /notices/v1/red
      operations:
      - name: get-notices-v1-red
        method: GET
        description: Get Red Notices
        inputParameters:
        - name: forename
          in: query
          type: string
          description: First name
        - name: name
          in: query
          type: string
          description: Last name
        - name: nationality
          in: query
          type: string
          description: Two digit country code
        - name: ageMax
          in: query
          type: integer
          description: maximum age
        - name: ageMin
          in: query
          type: integer
          description: minimum age
        - name: freeText
          in: query
          type: string
          description: Free text query
        - name: sexId
          in: query
          type: string
          description: Free text query
        - name: arrestWarrantCountryId
          in: query
          type: string
          description: Two digit country code
        - name: page
          in: query
          type: integer
          description: pagination - starts with 1
        - name: resultPerPage
          in: query
          type: integer
          description: resultPerPage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: notices-v1-red-noticeid
      path: /notices/v1/red/{noticeID}
      operations:
      - name: get-notices-v1-red-noticeid
        method: GET
        description: Get Red Notice Details
        inputParameters:
        - name: noticeID
          in: path
          type: string
          required: true
          description: Notice ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: notices-v1-red-noticeid-images
